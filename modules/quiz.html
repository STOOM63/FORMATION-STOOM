<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Certification Vendeur STOOM</title>

<link rel="stylesheet" href="../style.css">

<style>

.quiz{
max-width:900px;
margin:auto;
}

.question{
margin-bottom:28px;
padding:18px;
border-radius:8px;
background:#f6f8fb;
}

.question p{
font-weight:bold;
margin-bottom:8px;
}

button{
padding:12px 22px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
background:#1e90ff;
color:white;
margin-top:20px;
}

.result{
font-size:22px;
margin-top:30px;
text-align:center;
}

.certificat{

margin-top:40px;
padding:40px;
border:4px solid #1e90ff;
border-radius:10px;
text-align:center;
background:white;

}

.certificat h2{
font-size:32px;
margin-bottom:5px;
}

.certificat h3{
font-size:26px;
margin-top:10px;
}

.badge{
font-size:22px;
margin-top:15px;
}

</style>

</head>

<body>

<section class="modules quiz">

<h1>Certification Vendeur STOOM</h1>

<p>Ce quiz valide les connaissances nécessaires pour conseiller correctement un client dans une boutique STOOM.</p>

<br>

<label>Nom du vendeur :</label><br>
<input type="text" id="vendeur" placeholder="Nom du vendeur">

<br><br>

<div id="questions"></div>

<button onclick="calculerScore()">Valider le quiz</button>

<div class="result" id="result"></div>

<div id="certificat"></div>

<script>

const questions = [

["Un client fume environ 20 cigarettes par jour. Quel matériel est généralement conseillé ?",["Pod ou matériel MTL","Matériel DL puissant","Dripper reconstructible"],0],

["Pourquoi un matériel puissant avec nicotine élevée peut être désagréable ?",["Hit trop fort","Batterie lente","Liquide froid"],0],

["Quel est le rôle principal de la nicotine ?",["Éviter le manque","Créer la vapeur","Refroidir la résistance"],0],

["Pourquoi amorcer une résistance ?",["Imbiber le coton","Augmenter puissance","Nettoyer batterie"],0],

["Cause fréquente du goût de brûlé ?",["Résistance mal amorcée","Airflow ouvert","Liquide froid"],0],

["Pourquoi un liquide riche en VG peut poser problème ?",["Liquide plus épais","Trop de nicotine","Batterie faible"],0],

["Avantage du tirage MTL ?",["Proche cigarette","Plus vapeur","Moins batterie"],0],

["Pourquoi poser des questions au client ?",["Comprendre besoins","Gagner temps","Augmenter prix"],0],

["Rôle airflow ?",["Régler tirage","Augmenter nicotine","Refroidir batterie"],0],

["Durée de vie moyenne résistance ?",["1 à 2 semaines","6 mois","2 ans"],0],

["Pourquoi expliquer matériel au client ?",["Éviter erreurs","Réduire vente","Augmenter puissance"],0],

["Pourquoi proposer plusieurs liquides ?",["Consommation régulière","Vider stock","Décoration"],0],

["Objectif du suivi STOOM ?",["Accompagner client","Promotion","Paiement"],0],

["Nicotine trop faible provoque ?",["Manque","Fuite","Chauffe batterie"],0],

["Première chose face à un problème client ?",["Écouter","Remplacer direct","Refuser SAV"],0],

["Airflow trop fermé provoque ?",["Tirage serré","Perte nicotine","Batterie chaude"],0],

["Pourquoi travailler avec Flavour Power ?",["Fabricant auvergnat qualité","Prix bas","Marketing"],0],

["Pourquoi demander avis Google ?",["Visibilité boutique","Augmenter nicotine","Réduire prix"],0],

["Client vapote mais fume encore ?",["Encourager et ajuster","Arrêter vape","Ignorer"],0],

["Rôle du vendeur STOOM ?",["Conseiller client","Vendre cher","Finir vite"],0]

]

function genererQuiz(){

let zone = document.getElementById("questions")

questions.forEach((q,i)=>{

let bloc = `<div class="question">
<p>${i+1}. ${q[0]}</p>`

q[1].forEach((rep,j)=>{

bloc += `<label>
<input type="radio" name="q${i}" value="${j}">
${rep}
</label><br>`

})

bloc += "</div>"

zone.innerHTML += bloc

})

}

genererQuiz()


function calculerScore(){

let score = 0

questions.forEach((q,i)=>{

let r = document.querySelector(`input[name="q${i}"]:checked`)

if(r && parseInt(r.value) === q[2]) score++

})

let vendeur = document.getElementById("vendeur").value || "Vendeur"

let date = new Date().toLocaleDateString()

document.getElementById("result").innerHTML =
`Score obtenu : <strong>${score} / 20</strong>`

localStorage.setItem("certifSTOOM",
JSON.stringify({vendeur,score,date}))

if(score >= 16){

document.getElementById("certificat").innerHTML =

`<div class="certificat">

<h2>Certification Vendeur STOOM</h2>

<p>Formation interne validée</p>

<h3>${vendeur}</h3>

<p>Score obtenu : <strong>${score} / 20</strong></p>

<p>Date : ${date}</p>

<div class="badge">
🏅 Vendeur Certifié STOOM
</div>

<br>

<p>Direction STOOM</p>

<br>

<button onclick="window.print()">Afficher / Imprimer le certificat</button>

</div>`

}

}

window.onload = function(){

let saved = localStorage.getItem("certifSTOOM")

if(saved){

let data = JSON.parse(saved)

document.getElementById("result").innerHTML =
"Dernier score enregistré : "+data.score+" / 20"

}

}

</script>

</section>

</body>
</html>
